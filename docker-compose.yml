services:
  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DB_USER:-usuario_tesis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clave_tesis_123}
      POSTGRES_DB: ${DB_NAME:-mydb_tesis}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-usuario_tesis} -d ${DB_NAME:-mydb_tesis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - project_tesis

  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-usuario_tesis}
      DB_PASSWORD: ${DB_PASSWORD:-clave_tesis_123}
      DB_NAME: ${DB_NAME:-mydb_tesis}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - project_tesis

  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "8080:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - project_tesis

volumes:
  db_data:

networks:
  project_tesis:
    driver: bridge