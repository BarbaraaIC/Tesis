services:
  db:
    image: postgres:16
    container_name: postgres_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-usuario_tesis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clave_tesis_123}
      POSTGRES_DB: ${DB_NAME:-mydb_tesis}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-usuario_tesis} -d ${DB_NAME:-mydb_tesis}',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - project_tesis

  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - '3000:3000'
    environment:
      JWT_SECRET: ${JWT_SECRET:-tu_clave_secreta_aqui}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DATABASE_URL: ${DATABASE_URL:-postgresql://usuario_tesis:clave_tesis_123@db:5432/mydb_tesis?schema=public}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - project_tesis

  frontend:
    # build: ./frontend
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
    container_name: frontend_app
    ports:
      - '8080:3000'
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - project_tesis

volumes:
  db_data:

networks:
  project_tesis:
    driver: bridge
